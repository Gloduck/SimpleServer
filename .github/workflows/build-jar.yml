name: Build Jar Package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build jar (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            node-architecture: x64
            java-architecture: x64
          - os: windows-latest
            platform: windows-x64
            node-architecture: x64
            java-architecture: x64
          - os: windows-11-arm
            platform: windows-arm64
            node-architecture: arm64
            java-architecture: arm64

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          architecture: ${{ matrix.node-architecture }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          architecture: ${{ matrix.java-architecture }}
          cache: 'maven'

      - name: Build jar package
        run: bash script/build.sh clean buildJar

      - name: Upload jar artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SimpleServer-jar-${{ matrix.platform }}
          path: target/SimpleServer.tar.gz
          if-no-files-found: error
